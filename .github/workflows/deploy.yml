name: Deploy Landpage

on:
  push:
    branches: [main, homolog, develop]

jobs:
  set-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=PROD" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "homolog" ]; then
            echo "environment=HOMOLOG" >> $GITHUB_OUTPUT
          else
            echo "environment=DEV" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: set-env
    runs-on: ubuntu-latest
    environment: ${{ needs.set-env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload files
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "mkdir -p ${{ vars.DEPLOY_DIR }}"
          scp -r dist Dockerfile nginx-container.conf ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ vars.DEPLOY_DIR }}/

      - name: Build and restart container
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "\
            cd ${{ vars.DEPLOY_DIR }} && \
            docker build -t ${{ vars.CONTAINER_NAME }} . && \
            docker rm -f ${{ vars.CONTAINER_NAME }} && \
            docker run -d --name ${{ vars.CONTAINER_NAME }} -p ${{ vars.PORT }}:3000 --restart unless-stopped ${{ vars.CONTAINER_NAME }}"
