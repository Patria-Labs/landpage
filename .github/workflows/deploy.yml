name: Deploy Landpage

on:
  push:
    branches: [main, homolog, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'PROD' || github.ref_name == 'homolog' && 'HOMOLOG' || 'DEV' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload files
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "mkdir -p ${{ vars.DEPLOY_DIR }}"
          scp -r dist Dockerfile nginx-container.conf ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${{ vars.DEPLOY_DIR }}/

      - name: Build and restart container
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "\
            docker compose -f ${{ vars.COMPOSE_FILE }} build ${{ vars.CONTAINER_NAME }} && \
            docker compose -f ${{ vars.COMPOSE_FILE }} up -d ${{ vars.CONTAINER_NAME }}"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "curl -sf -o /dev/null -w '%{http_code}' http://127.0.0.1:${{ vars.PORT }}/ || echo 'FAIL'")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed! Status: $STATUS"
            ssh ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} "docker logs ${{ vars.CONTAINER_NAME }} --tail 20"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"
